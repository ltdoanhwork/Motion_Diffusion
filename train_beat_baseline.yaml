profile: beat_baseline
description: BEAT baseline training preset (copied from checkpoints/beat/beat_baseline/opt.txt)

script: tools/train.py
command: >-
  PYTHONPATH=. python -u tools/train.py
  --name beat_baseline
  --dataset_name beat
  --batch_size 32
  --times 1
  --num_epochs 50
  --num_layers 8
  --latent_dim 512
  --diffusion_steps 1000
  --beta_schedule linear
  --prediction_type v_prediction
  --lr 1e-4
  --ema_decay 0.9999
  --gradient_accumulation_steps 4
  --max_grad_norm 1.0
  --cfg_dropout 0.1
  --cfg_scale 4.5
  --log_every 10
  --save_every_e 5
  --eval_every_e 5
  --save_latest 1
  --test_ratio 0.1
  --split_seed 3407
  --motion_rep rot6d

args: 
  name: beat_baseline
  dataset_name: beat
  checkpoints_dir: ./checkpoints
  batch_size: 32
  times: 1
  num_epochs: 50
  num_layers: 8
  latent_dim: 512
  diffusion_steps: 1000
  beta_schedule: linear
  prediction_type: v_prediction
  lr: 0.0001
  ema_decay: 0.9999
  gradient_accumulation_steps: 4
  max_grad_norm: 1.0
  cfg_dropout: 0.1
  cfg_scale: 4.5
  test_ratio: 0.1
  split_seed: 3407
  log_every: 10
  save_every_e: 5
  eval_every_e: 5
  save_latest: 1
  velocity_weight: 0.5
  acceleration_weight: 0.1
  geometric_weight: 0.3
  fk_weight: 1.0

flags:
  use_amp: false
  use_velocity_loss: false
  use_acceleration_loss: false
  use_geometric_loss: false
  use_fk_loss: false
  use_min_snr_weighting: false
  use_uncertainty_weighting: false
  use_sinkhorn_geom_loss: false
  use_sobolev_training: false
  sobolev_stochastic: false
